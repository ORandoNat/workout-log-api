<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Log</title>
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="page-container">
    <h1>Workout Log</h1>

    <h2>Add Workout</h2>
    <div id="add-workout-form">
      <div id="required-fields">
        <input type="text" id="name" placeholder="Workout name" />
        <input type="number" id="amount" placeholder="Amount" />
        <select id="work-type">
          <option value="reps">Reps</option>
          <option value="minutes">Minutes</option>
        </select>
        <div id="date-container">
            <input type="date" id="date" />
            <input type="time" id="time" />
        </div>
      </div>
      <div id="notes-container">
        <button type="button" class="notesButton">Add Notes +</button>
        <textarea id="notes" placeholder="Type your notes here..." style="display: none"></textarea>
      </div>
      <button class="logButton">Log Workout</button>
    </div>
    <p id="error-message" style="display: none"> </p>
    <form id="edit-form" style="display: none">
      <input type="text" id="edit-name" />
      <input type="number" id="edit-amount" />
      <select id="edit-work-type">
        <option value="reps">Reps</option>
        <option value="minutes">Minutes</option>
      </select>
      <br>
      <textarea id="edit-notes"></textarea>
      <div id="edit-date-container">
        <input type="date" id="edit-date" />
        <input type="time" id="edit-time" />
      </div>
      <button type="button" id="save-edit-button">Save changes</button>
      <button type="button" id="cancel-edit-button">Cancel</button>
    </form>

    <h2>Workouts</h2>
    <input type="text" id="search-bar" placeholder="Search workouts..." />
    <button type="button" class="load-button">Load Workouts</button>
    <ul id="workout-list"></ul>
  </div>
</body>
</html>
