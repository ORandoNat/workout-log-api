<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Log</title>
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="app-header">
    <div class="header-left">Workout Log</div>
    <div class="header-center" id="welcome-message"></div>
    <button class="header-right" id="logout-btn">Logout</button>
  </header>
  <main>
    <div id="page-container">
    
    <div id="page-container">
      <h2>Add Workout</h2>
      <div id="add-workout-form">
        <div id="required-fields">
          <div id="required-fields-name">
            <label for="name">Workout name:</label>
            <input type="text" id="name" placeholder="Workout name" />
          </div>
          <div id="required-fields-amount">
            <label for="amount">Amount:</label>
            <input type="number" id="amount" placeholder="Amount" />
          </div>
          <div id="required-fields-work-type">
            <label for="work-type">Workout type:</label>
            <select id="work-type">
              <option value="reps">Reps</option>
              <option value="minutes">Minutes</option>
            </select>
          </div>
          <div id="date-container">
            <div id="date-container-calendar">
              <label for="date">Date:</label>
              <input type="date" id="date" />
            </div>
            <div id="date-container-time">
              <label for="time">Time:</label>
              <input type="time" id="time" />
            </div>
          </div>
        </div>
        <div id="notes-container">
          <button type="button" id="notes-button">Add Notes +</button>
          <textarea id="notes" class="hidden" placeholder="Type your notes here..."></textarea>
        </div>
        <button id="log-button">Log Workout</button>
      </div>
      <p id="error-message" class="hidden"> </p>
  <div id="edit-modal" class="hidden modal-backdrop">
    <div class="modal-box">
      <button id="close-modal" class="modal-close">&times;</button>
      <h2>Edit Workout</h2>
      <form id="edit-form">
        <div id="edit-name-container">
          <label for="edit-name">Workout name:</label>
          <input type="text" id="edit-name" />
        </div>
        <div id="edit-amount-container">
          <label for="edit-amount">Amount:</label>
          <input type="number" id="edit-amount" />
        </div>
        <div id="edit-work-type-container">
          <label for="edit-work-type">Workout type:</label>
          <select id="edit-work-type">
            <option value="reps">Reps</option>
            <option value="minutes">Minutes</option>
          </select>
        </div>
        <div id="edit-notes-container">
          <label for="edit-notes">Notes:</label>
          <textarea id="edit-notes"></textarea>
        </div>
        <div id="edit-date-container">
          <label for="edit-date">Date:</label>
          <input type="date" id="edit-date" />
          <label for="edit-time">Time:</label>
          <input type="time" id="edit-time" />
        </div>
        <button type="button" id="save-edit-button">Save changes</button>
        <button type="button" id="cancel-edit-button">Cancel</button>
      </form>
    </div>
  </div>
  <div id="delete-modal" class="hidden modal-backdrop">
    <div class="modal-box">
      <h2>Delete Workout</h2>
      <p>This action cannot be undone. Are you sure you want to delete this workout?</p>
      <div class="modal-buttons">
        <button id="cancel-delete-button">Cancel</button>
        <button id="confirm-delete-button" class="danger">Delete</button>
      </div>
    </div>
  </div>
      <h2>Workouts</h2>
      <input type="text" id="search-bar" placeholder="Search workouts..." />
      <button id="clear-search" class="hidden">X</button>
      <button type="button" id="load-button">Load Workouts</button>
      <div id="loading-indicator" class="hidden">Loading...</div>
      <div id="empty-state" class="hidden empty">No workouts yet - add your first one!</div>
      <ul id="workout-list"></ul>
    </div>
    <div id="delete-toast" class="hidden">Deleted!</div>
  </main>
  <footer>
    <p>&copy; 2026 Workout Log. All rights reserved.</p>
  </footer>
</body>
</html>
