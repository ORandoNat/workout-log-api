<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <script src="login.js" defer></script>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header></header>
        <main>
            <div id="page-container"></div>

            </form>
        </main>
        <footer></footer>
    </body>
</html>
